lessons:
  - id: 60
    date: 2026-04-25
    source: "session"
    category: process
    lesson: |
      Two related process failures showed up in the Phase 6 close-out
      sweep. Capturing both because the second is the more important
      lesson:

      (a) Parallel-fanout subagent briefs (lessons #56/#57/#59) need
      one more clause: "before reporting back, run `pnpm --filter
      @hyperspanner/desktop test -- <your-tool>` on your own slice and
      fix any failures." Phase 6's fanouts produced subagents whose
      work was typecheck-clean but behaviorally broken in ways only
      visible at test time. Aggregating these into a single closing-out
      sweep cost roughly an entire conversation window. Examples:

        - `case-transform/lib.ts` had `current.slice(0, -1)` silently
          dropping the last char of every uppercase acronym
          (HELLO → HELL).
        - `cidr-calc/lib.ts` was calling `Number("/24")` (which is
          `NaN`) and the IPv6 classification masks were 64-bit literals
          where the algorithm needed 128-bit constants.
        - `whitespace-clean/lib.ts` had a `tabsToSpaces` option defined
          on the type and threaded through to the UI but the pipeline
          never applied it.
        - `hex-inspector/lib.ts` had an unconditional middle-gap
          insertion that broke partial-row ASCII alignment.
        - `hash-workbench/lib.ts` had a formatByteSize threshold off
          by one decimal place.
        - `base64-pad/lib.ts` had a fatal-mode TextDecoder that masked
          adjacent test paths.

      Concrete amendment to the parallel-fanout brief template
      (cumulative with #56/#57/#59):

        > Before reporting back, run `pnpm --filter
        > @hyperspanner/desktop test -- <your-tool-name>` and
        > `pnpm --filter @hyperspanner/desktop typecheck`. Both must
        > be clean. If a test you don't recognize fails, don't paper
        > over it — read the test, understand what it asserts, and
        > fix either the implementation or the test (with a comment
        > explaining why the test was wrong) before returning. Do
        > not return a slice with red tests; the parent has many
        > subagents to integrate and cannot afford to debug N tools.

      (b) **The bigger lesson — never claim "all checks pass" without
      actually running the checks.** During this session Claude (me)
      wrote a multi-paragraph "Phase 6 verification gate PASSED" entry
      to status.md and flipped `current_phase: 7` in plan.md based on
      a user message that said "all checks pass." The user was
      reporting their CHECKLIST progress, not that they'd actually
      re-run the test suite — the previous turn's fixes hadn't been
      verified at all. The user re-ran tests, found 13 still red,
      and called it out. Three docs had to be reverted; trust got
      bruised.

      Rule going forward: a "all green / verification PASSED" status
      entry needs to be backed by either (i) a test-output paste from
      the user, or (ii) a fresh `mcp__workspace__bash` run in this
      session that actually ran the suite. "User said it's done" is
      not a verification artifact — the user is busy and may be
      reporting an in-progress state. When in doubt, ask: "have you
      re-run `pnpm test` since the last fixes? if yes, can you paste
      the tail?" before writing claims into the project memory.

      Recovery cost when this fails: status.md, plan.md, and
      lessons.yaml all needed surgical reverts plus a new session
      entry explaining what happened. That's roughly the same cost
      as the verification run would have been.
    applied: true

  - id: 59
    date: 2026-04-24
    source: "session"
    category: process
    lesson: |
      Subagent ownership contracts (lesson #57) need to name the OWNER of every
      file a subagent touches or imports, not just the files it writes to. In
      Phase 6.4's parallel fanout, Subagent B (Hash Workbench tool) was given
      "exclusive ownership" of the hash-workbench directory and was told its
      imports came from `@/ipc`. B still wrote to `ipc/hash.ts` and
      `ipc/index.ts` as "additional work" because its brief didn't explicitly
      say "DO NOT create the IPC module you're importing — Subagent D is
      creating it." Subagent D's last-writer-wins overwrite saved us (D
      finished last and put the canonical file on disk), but this is fragile
      — if B had finished last, D's well-styled fs.ts-mirroring version would
      have been silently replaced by B's improvised stub.

      Fix going forward: every subagent brief that depends on a sibling's
      output MUST include a sentence of the form "sibling subagent <X> is
      creating <file>; you import from it but DO NOT create or modify that
      file yourself — assume the import will resolve when typecheck runs at
      the parent." This is now part of the parallel-fanout contract (amends
      lesson #57 clause (a) "exclusive ownership").

      Secondary observation: subagents spawned with `general-purpose` take
      initiative. That's usually good, but "helpful" initiative that crosses
      ownership lines is indistinguishable from a missing handoff — there's
      no signal until the files collide. Briefs should be prescriptive on
      the boundary, not just the center.
    applied: true

  - id: 1
    date: 2026-04-20
    source: "session"
    category: tooling
    lesson: |
      On Windows, `tauri-build` unconditionally generates a Windows resource file
      during every `cargo` invocation (including `cargo tauri dev`). This requires
      `apps/desktop/src-tauri/icons/icon.ico` to exist with valid multi-resolution
      content. Icons cannot be deferred to bundling — they're a dev-time requirement.
      Generate a proper multi-resolution ICO (16/24/32/48/64/128/256) up front.
    applied: true

  - id: 2
    date: 2026-04-20
    source: "session"
    category: tooling
    lesson: |
      The Linux bash sandbox cannot traverse pnpm's symlink-based node_modules layout
      when the project is mounted from the Windows host — following any symlink inside
      `node_modules/` returns I/O errors. This means `tsc`, `eslint`, `vitest`, and any
      other node-based verifier cannot be run from the sandbox. Plan verification
      (typecheck, lint, test) to run on the Windows host; reserve the sandbox for
      pure filesystem and non-node tooling work.
    applied: true

  - id: 3
    date: 2026-04-20
    source: "decision"
    category: architecture
    lesson: |
      Keep the primitive library (`@hyperspanner/lcars-ui`) framework-pure: no hooks
      from the host app (no `useTheme`, no `useSound`). Primitives consume CSS custom
      properties injected by `ThemeContext` on `:root`, and accept optional `color` /
      `background` props for local overrides. Hosts wire cross-cutting concerns (sound,
      haptics) via onClick wrappers. This lets the library move to a separate repo or
      package later without a dependency graph rewrite.
    applied: true

  - id: 4
    date: 2026-04-20
    source: "session"
    category: tooling
    lesson: |
      With `verbatimModuleSyntax` and strict mode, every workspace package that imports
      CSS Modules needs its own ambient declaration (`declare module '*.module.css'`).
      The consuming app's `vite-env.d.ts` does NOT cover source files inside a sibling
      workspace package — tsc's type root is per-project. Add a `globals.d.ts` to each
      package that uses CSS Modules.
    applied: true

  - id: 5
    date: 2026-04-20
    source: "decision"
    category: architecture
    lesson: |
      Data-visualization primitives (LcarsTable, LcarsSparkline, LcarsGauge, LcarsChart,
      LcarsDataCascade) are deferred to Phase 6 where the tools that consume them land.
      Building them in Phase 1 risks designing against imagined consumers. The original
      plan listed them as Phase 1 items — revised during Phase 1 when it became clear
      the shell doesn't need them.
    applied: true

  - id: 6
    date: 2026-04-20
    source: "decision"
    category: architecture
    lesson: |
      Map semantic roles to tokens inside the primitive package
      (`LcarsSemanticRole -> LcarsColorToken`), not inside each primitive. This keeps
      the variant→color mapping in one place; switching themes (picard-modern / classic
      / nemesis-blue / lower-decks) remaps the CSS vars without any primitive knowing
      which variant is active.
    applied: true

  - id: 7
    date: 2026-04-20
    source: "observation"
    category: process
    lesson: |
      "proceed" in this project means continue autonomously until reaching a reviewable
      milestone (an artifact the user can inspect), not "do exactly one more step".
      Phase 1's milestone is the runnable `/primitive-gallery` — stopping before that
      would force another round-trip.
    applied: true

  - id: 8
    date: 2026-04-20
    source: "decision"
    category: architecture
    lesson: |
      The `picard-modern` variant (muted salmon #d88463, dusty purple #8a7aa8, charcoal
      #0a0a0f, sand #eae4d6) was added as the default because the classic LCARS palette
      reads as cosplay at developer-tool fidelity. Productivity-console muting preserves
      LCARS grammar (shapes, layout, typography) while changing the color register.
      Classic variant still ships for theme switching.
    applied: true

  - id: 9
    date: 2026-04-20
    source: "decision"
    category: architecture
    lesson: |
      Shell zones are composed by CSS Grid in `AppShell`, with collapse driven by
      state classes that mutate `grid-template-columns` / `grid-template-rows`
      rather than by unmounting the zone components. This keeps layout transitions
      cheap (no re-mount, no re-layout thrash from a sibling tree) and lets the
      LCARS chrome animate width/height smoothly. Zone components still render an
      internal `aria-hidden` state so assistive tech reflects the collapse.
    applied: true

  - id: 10
    date: 2026-04-20
    source: "decision"
    category: architecture
    lesson: |
      Zone open/closed state lives in a local `useZoneState` hook for Phase 2, not
      yet in the Zustand workspace store. The hook exposes the same shape
      (`open`, `toggle`, `setOpen`, `reset`) the store will expose later, so
      Phase 3's swap is a one-line refactor inside `AppShell` and LeftNavigator.
      Keyboard shortcuts live with the hook to keep the shortcut map colocated
      with the state it mutates.
    applied: true

  - id: 11
    date: 2026-04-20
    source: "decision"
    category: architecture
    lesson: |
      Routing for Phase 2 is a hand-rolled `useHashRoute` hook, not react-router.
      The shell only needs two destinations (shell vs gallery), and the gallery
      is a dev affordance — a full router would add build weight for nothing.
      Swap-in point for a real router is `App.tsx`; every consumer uses the
      returned `[route, navigate]` tuple, matching `useState`'s shape, so the
      replacement is mechanical.
    applied: true

  - id: 12
    date: 2026-04-20
    source: "session"
    category: ux
    lesson: |
      When the Left navigator collapses, the shell still needs a visible handle
      to reopen it or the pane becomes unreachable without the keyboard shortcut.
      The closed-state affordance is a single orange elbow-capped button that
      fills the `nav` grid area at `--shell-nav-closed-width` (44px). This
      preserves LCARS grammar — the color-blocked elbow — while keeping the
      collapsed state at a clickable width. Right and Bottom collapse to 0 because
      their toggle pills live on the zone header which remains visible in the
      expanded state, so there's a round-trip affordance elsewhere.
    applied: true

  - id: 13
    date: 2026-04-20
    source: "session"
    category: architecture
    lesson: |
      Zustand v5 selectors that derive a new array or object on every call
      (e.g. `s.open.filter(t => t.zone === 'center')`) must be wrapped in
      `useShallow` from `zustand/react/shallow`, or the consuming component
      re-renders every time the store updates at all. In AppShell the three
      zone arrays are subscribed with `useShallow` while scalar + function
      selections remain bare. Function references returned by the store are
      stable across renders, so `useCallback` wrappers around them only need
      the function itself as a dep.
    applied: true

  - id: 14
    date: 2026-04-20
    source: "session"
    category: correctness
    lesson: |
      When a hook exposes a `setState` that supports a function form
      (`setState(prev => next)`), computing `prev` from a closed-over state
      snapshot is wrong if two `setState` calls can be batched in a single
      tick. The second call reads the stale snapshot and overwrites the
      first's update. Fix by reading the live value from the store
      synchronously inside `setState` (`useStore.getState().byId[id]`)
      rather than from the selector closure. `useTool.test.ts` catches
      this exactly — two `prev => prev.count + N` calls in one `act()`
      must compose.
    applied: true

  - id: 15
    date: 2026-04-20
    source: "session"
    category: tooling
    lesson: |
      React 19 removed the ad-hoc `renderHook` export that was briefly
      available in an RFC; hook tests must import `renderHook` and `act`
      from `@testing-library/react`. That package in turn needs
      `@testing-library/dom` as an explicit dep and `jsdom` as a devDep
      (Vitest's default `node` env has no DOM). Store tests that go
      through `useWorkspaceStore.getState()` / `setState(DEFAULT_WORKSPACE)`
      don't need the DOM and stay on the default node env; only hook
      tests opt in via `// @vitest-environment jsdom`.
    applied: true

  - id: 16
    date: 2026-04-20
    source: "session"
    category: ux
    lesson: |
      Single-instance tool focus needs a visible signal when the user
      re-opens something that's already open, or the click feels broken.
      The store carries a transient `pulseId` per `OpenTool` and a global
      `pulseCounter`; `openTool` on an existing id bumps both. Consumers
      render a `PulsingTab` that watches `pulseId` via effect and toggles
      a `.pulsing` class for one 520ms CSS keyframe, then clears it.
      The `pulseId` is opaque — any new value triggers the animation —
      which lets the same tab pulse repeatedly without manual reset logic.
    applied: true

  - id: 17
    date: 2026-04-20
    source: "session"
    category: tooling
    lesson: |
      React's JSX rules require component references to be PascalCase; a
      lowercase member expression like `<descriptor.component />` is
      treated as an HTML element and breaks at runtime. When the component
      comes from a registry lookup, alias it first:
      `const ToolBody = descriptor.component; return <ToolBody … />`.
      Wrapping the alias in an IIFE inside JSX keeps the scope local to
      the branch that needs it. Likewise `LcarsPill` only accepts
      `aria-label` among ARIA props — `role`, `aria-selected`, and any
      other ARIA attributes must go on a wrapping `div`.
    applied: true

  - id: 18
    date: 2026-04-20
    source: "session"
    category: tooling
    lesson: |
      pnpm v9 fails with EPERM during `install` when the workspace root
      sits on the Windows-host-backed sandbox mount — it can create a
      temp file but not `unlink` it, which pnpm does to probe for
      cross-device links. Combined with lesson #2 (can't follow pnpm
      symlinks), this means the Linux sandbox cannot install or verify
      node packages at all. Delegate install + typecheck + test to the
      Windows host; use the sandbox for file edits, Git, and static
      review via sub-agents.
    applied: true

  - id: 19
    date: 2026-04-21
    source: "session"
    category: architecture
    lesson: |
      For LCARS elbow corners, prefer concrete absolutely-positioned divs
      with a radial-gradient background over pseudo-elements with `z-index: -1`
      that propagate to an ancestor stacking context. The pseudo approach
      (used by the LCARS-24.2 reference) depends on every ancestor between
      the element and the intended paint layer NOT being a stacking-context
      creator. That invariant breaks the moment the layout is embedded
      in another context (DerisScreen, PrimitiveGallery, AppShell), and
      fixing it requires auditing every ancestor for `isolation: isolate`,
      `position + z-index`, `transform`, `opacity < 1`, `filter`, etc.
      The concrete-div approach sidesteps stacking entirely:
      `radial-gradient(circle 60px at <corner>, transparent 59.5px, <color> 60px)`
      draws the quarter-crescent directly. Inside the 60px disc: transparent
      (so the page background shows through). Outside: rail color. The
      div paints in its normal positioned layer — always visible, no
      z-index gymnastics. Overlap the elbow onto the bar by 1px to close
      subpixel seams under zoom, and sync the bar's first-segment color
      to the rail color so the overlap is invisible.
    applied: true

  - id: 20
    date: 2026-04-21
    source: "session"
    category: architecture
    lesson: |
      Don't scale the bar-height or rail-corner-radius responsively when
      the elbow quarter-circle is a fixed 60×60 primitive. The reference
      LCARS-24.2 stylesheet shrinks the bar (28→10px) and radius (160→40px)
      across breakpoints, but our elbow geometry is baked at 60px —
      shrinking the bar while the elbow stays 60px makes the curve
      disproportionate to the bar it joins, and the hand-off reads as
      broken ("missing bar" at narrow widths). The signature LCARS curve
      is recognizable precisely because its proportions are consistent.
      Only responsively shrink `--lcars-spacing-left-frame-width`; that's
      the one dimension that genuinely needs to give up real estate on
      small screens.
    applied: true

  - id: 21
    date: 2026-04-21
    source: "session"
    category: layout
    lesson: |
      In a two-row flex-column container where the second row has
      `flex: 1 1 auto` and the first row has no explicit `flex`, the first
      row inherits `flex-shrink: 1` and can be silently compressed by
      pressure from below. If that row also has `overflow: hidden`,
      children that push past its shrunken height simply disappear.
      Worst-case victim: the LAST flex-child in the DOM order, since
      content overflows at the bottom. In LcarsStandardLayout this was
      exactly the top `topBar + elbow` pair — silently clipped while the
      bottom row's bar (which was the FIRST child of its right column)
      stayed visible because compression squeezed `main` instead. Fix:
      `flex-shrink: 0` on the top `.wrap`, keeping `.wrap.gap` (higher
      specificity) with `flex: 1 1 auto` so the bottom row still absorbs
      remaining space. Rule of thumb: if a flex container's row has
      `overflow: hidden` and can't shed content, it must also have
      `flex-shrink: 0`, or pressure from another row will clip it.
    applied: true

  - id: 22
    date: 2026-04-21
    source: "session"
    category: layout
    lesson: |
      Child order inside a flex-column matters for graceful degradation
      when the column can be compressed. Place the most load-bearing
      decorative element (here: the horizontal framing bar) FIRST or
      adjacent to a naturally-scrollable child — not last in a list that
      ends with a fixed-height decorative element. The bottom row of
      LcarsStandardLayout rendered correctly through twelve rounds of
      debugging because its bar is first and `main` (overflow-y: auto)
      absorbs compression; the top row broke because its bar was last
      after a tall cascade + nav, so the bar was the first to get
      clipped by `overflow: hidden`. Graceful-degradation principle:
      order children so the first things clipped are things users
      can scroll or resize around, not structural chrome.
    applied: true

  - id: 23
    date: 2026-04-22
    source: "session"
    category: architecture
    lesson: |
      When extracting a primitive from an in-place screen, split by
      interactive leaf vs. wrapping container. LcarsTabCluster is a
      thin flex wrapper; LcarsTabPill is the interactive leaf with
      its own `active` state and CSS custom property for color. This
      mirrors the `<Table>/<Tr>` or `<ul>/<li>` pattern: each primitive
      stays single-purpose, callers compose the structure, and the
      wrapper never grows a `tabs: T[]` prop that would fight with
      per-pill customization. Rule of thumb: if a primitive would
      otherwise need an `items` array whose entries each have their
      own handlers and active state, split it into parent + child.
    applied: true

  - id: 24
    date: 2026-04-22
    source: "session"
    category: architecture
    lesson: |
      `ReactNode`-typed slots (like `topPanels?: ReactNode`) in layout
      primitives don't enforce their expected child shape — you can
      pass a raw `<div>` and TypeScript stays quiet. But the
      surrounding geometry (rail color sync, panel-grid layout,
      curve-to-bar continuation) is designed for a specific child
      type (LcarsPanel). When this goes wrong the failure mode is
      visual, not compile-time: a misshapen rectangle appears where
      the rail meets the bar. Two mitigations worth considering:
      (a) doc-comment the slot prop with "expected children:
      `LcarsPanel`", (b) if the constraint is hard, type the prop as
      `ReactElement<LcarsPanelProps> | Array<ReactElement<LcarsPanelProps>>`
      so callers get a type error instead of a visual bug. For now,
      keep it ReactNode for flexibility but review subagent-generated
      screens specifically for this slot.
    applied: true

  - id: 25
    date: 2026-04-22
    source: "session"
    category: process
    lesson: |
      Parallel subagents can safely edit the same file if you brief
      them with explicit ownership boundaries. For plan-006 T5/T6,
      two subagents each added 3 imports + 3 `Component` fields to
      `registry.ts` — 6 simultaneous edits to one file, zero
      collisions. The coordination recipe: (1) list exactly which
      entries each agent owns, (2) tell each agent to use `Edit` with
      enough unique surrounding context that the old_string only
      matches its owned entry, (3) explicitly forbid touching the
      other agent's entries. This works because `Edit` is an
      exact-text replace, not a structural merge — two edits to the
      same file with non-overlapping `old_string` matches compose
      cleanly. Reserve this pattern for when the shared file has
      naturally parallel regions (like a registry of independent
      entries); don't try it on files with cross-cutting concerns.
    applied: true

  - id: 26
    date: 2026-04-22
    source: "session"
    category: process
    lesson: |
      De-risk screens should be multi-config pressure tests, not
      single canonical usages. S5 TabClusterScreen shows 2-tab +
      3-tab + 5-tab configurations with independent state per
      cluster; S6 TrajectoryInsetScreen shows 3 different SVG body
      contents; S7 EventLogScreen shows 3 different severity/density
      configurations. This surfaces primitive-API ergonomics that a
      single canonical usage hides — for example, whether
      `activeTab` handling still reads clean when there's only 2
      tabs, or whether the event-log grid layout copes with a
      12-item dense readout next to a 5-item sparse one. The
      existing canonical S1 (HomeAutomationScreen) remains the
      reference image; S2–S7 earn their keep by pressure-testing
      edges the canonical usage doesn't reach.
    applied: true

  - id: 27
    date: 2026-04-22
    source: "session"
    category: architecture
    lesson: |
      When a layout state (collapsed, maximized, breakpoint)
      affects multiple geometrically-linked consumers, reassign the
      source-of-truth CSS custom property on the state class rather
      than overriding each consumer individually. Plan-005 needed
      the nav rail, the TopRail's brand band, and the shell-level
      elbow gradient to all shrink in lockstep when nav collapses.
      Instead of three override rules (`.leftClosed .nav { width:
      44px } .leftClosed .brandBand { width: 44px } .leftClosed
      .elbow { left: calc(... + 44px - 1px) }`), a single
      `.leftClosed { --shell-nav-width: 44px }` propagates to every
      consumer that reads the var — the grid track, brandBand, and
      elbow's `left` calc all update automatically. This removes
      duplication, eliminates "I forgot to update consumer N" bugs
      when new consumers appear, and reads as a declarative state
      override at the top of the cascade. The pattern is especially
      valuable when some consumers are in sibling components that
      don't even know about the state class.
    applied: true

  - id: 28
    date: 2026-04-22
    source: "session"
    category: architecture
    lesson: |
      Radial-gradient elbows need the gradient center at the OPPOSITE
      corner of where the transparent crescent should appear. For
      AppShell's top-left L-frame (TopRail above, Nav to the left),
      the elbow sits in the content area's top-left corner with the
      crescent opening toward the bottom-right (into content). That
      requires `radial-gradient(circle R at bottom right,
      transparent R-0.5, rail-color R)` — the gradient center at
      bottom-right produces a colored L hugging the top and left
      edges (welding to TopRail's bottom and Nav's right) with a
      transparent quarter-disc at bottom-right. Inverting this
      (`at top left`) would put the colored L on the wrong edges
      and the transparent disc pointing AWAY from content, which is
      the opposite of what a "weld at the inside corner" needs.
      Reasoning shortcut: point the gradient center at the corner
      furthest from where you want the colored region to paint.
    applied: true

  - id: 29
    date: 2026-04-22
    source: "session"
    category: process
    lesson: |
      When a user says "we had this aligned properly before," treat
      that as a regression signal — stop piling on new fixes and
      revert to the last-known-good state first, then investigate
      what changed. In the LcarsStandardLayout elbow-gap session I
      kept cranking the overlap value (1px → 3px → 10px → 12px with
      72px height) based on analytical guesses about flex-box
      geometry, even after the user reported the result still looked
      wrong. Each speculative fix added complexity and made the real
      regression harder to see. The right move was to revert and ask
      the user for a concrete pixel-accurate fix from their devtools
      — which is ultimately what resolved it (`calc(47px +
      bar-height)`). Analytical math about rendered layout is
      notoriously fragile when flex columns, percentage segments,
      and CSS vars interact; the user's rendered-browser observation
      is ground truth. Ask for a devtools screenshot or a concrete
      pixel override before guessing a fourth time.
    applied: true

  - id: 30
    date: 2026-04-22
    source: "session"
    category: architecture
    lesson: |
      LcarsStandardLayout's top and bottom elbows are NOT mirror-
      symmetric. The top row is a flex column pinned to 185px with
      banner/cascade/spacer stacked above the bar; the bottom row
      is flex:1 with `<main>` filling the space below the bar. The
      bar's actual top edge lands at a different distance from the
      container bottom/top than naive math predicts, and the two
      rows land at different distances because their flex
      compositions differ. Empirical tuning: elbowTop needs
      `calc(47px + bar-height)`, elbowBottom needs `calc(60px +
      bar-height)`. Do NOT "clean up" the asymmetry by mirroring
      one side to the other — the user explicitly corrected this
      ("the bottom one needs to be 60 height since the bottom
      segment is taller than the upper segments which needs to be
      47"). Keep the two values independently tuned with a CSS
      comment explaining why they differ, so a future cleanup pass
      doesn't collapse them.
    applied: true

  - id: 31
    date: 2026-04-22
    source: "observation"
    category: tooling
    lesson: |
      The bash sandbox's mount view of the Windows workspace can
      show stale or truncated file contents relative to what the
      Read tool sees (which reads from the Windows filesystem
      directly). In this session bash's view of AppShell.tsx,
      registry.ts, RailElbowScreen.tsx, and AppShell.module.css
      appeared to be cut off mid-statement, while the Read tool
      showed complete content and the Vite dev server compiled
      without error. Treat the Windows filesystem (what Read/Edit
      operate on) as source of truth; bash views are for running
      scripts/commands, not for diffing or verifying file content.
      If bash shows a file that looks truncated or inconsistent,
      re-read with the Read tool before concluding anything is
      broken.
    applied: true

  - id: 32
    date: 2026-04-22
    source: "session"
    category: architecture
    lesson: |
      Put search, favorites, and recents IN the navigator rail itself —
      not split across a separate overlay, top-nav header, or modal.
      Once the rail gets its own scroll container and the search field
      is pinned as a non-shrinking flex child, LcarsPanel composes fine
      as a section-header primitive, and the rail becomes the single
      entry point for tool launching. This matches LCARS's "everything
      framed by the rail" affordance and removes the need for a
      separate entry surface. The earlier TODO in LeftNavigator that
      claimed "search + favorites don't compose cleanly here" was a
      pre-Phase-4 artifact — the real blocker was the missing flex
      scroll plumbing on the rail stack, not the composition.
    applied: true

  - id: 33
    date: 2026-04-22
    source: "session"
    category: state
    lesson: |
      Zustand 5 + persist middleware recipe that works cleanly across
      jsdom tests and production: (a) wrap the store in `persist(...)`
      with `createJSONStorage(() => localStorage)` (not `localStorage`
      directly — the factory form lets the middleware lazily detect
      storage availability during tests); (b) suffix the store name
      with `:v1` so we can bump the version later without a migration
      function; (c) `partialize` to only persist the array itself, not
      the action closures. For Vitest, configure `environment: jsdom`
      in `vite.config.ts` (or per-file via `// @vitest-environment
      jsdom`) — Node's test environment has no `localStorage` and the
      persist middleware crashes on first write. Also: call
      `useFavorites.persist.clearStorage()` in `beforeEach` to isolate
      tests.
    applied: true

  - id: 34
    date: 2026-04-22
    source: "session"
    category: ux
    lesson: |
      Keyboard shortcut registries need per-binding "whenTyping"
      policy, not a single global rule. Default to `whenTyping:
      'block'` so typing in a search field or tool input can't
      accidentally fire Ctrl+W / Escape / etc. — but individual
      bindings that MUST fire from inside an input (⌘K to open the
      palette is the classic one) opt in via `whenTyping: 'allow'`.
      Detection: event.target is an HTMLInputElement,
      HTMLTextAreaElement, or has contentEditable='true' — check all
      three, not just INPUT. Also: bind at window level (capture
      phase) so the handler runs before any child input's default
      handling, and check event.defaultPrevented on the way in to
      cooperate with other capture-phase listeners.
    applied: true

  - id: 35
    date: 2026-04-22
    source: "session"
    category: search
    lesson: |
      Tiered numeric scoring beats boolean match for filter ranking.
      For a tool launcher that needs name + description + keyword
      search, a scoring function like `nameStartsWith=0,
      nameIncludes=1, descStartsWith=2, descIncludes=3, nothing=99`
      followed by `sort(by score then alphabetic)` gives the user what
      they mean: typing "js" surfaces "JSON Validator" before "Regex
      Tester (JS flavor)" because the name-prefix hit beats the
      description hit. A pure `string.includes(query)` filter can't
      express that ordering without a secondary pass, and
      substring-match alone puts popular tools at the bottom when
      their names don't happen to start with the query.
    applied: true

  - id: 36
    date: 2026-04-22
    source: "session"
    category: typing
    lesson: |
      When the same handler function is attached to multiple React
      elements of different HTML types, widen the event generic to
      the common ancestor (`HTMLElement`) rather than pinning to the
      first one. TabActionMenu's `handleKey` binds to both the
      trigger wrapper `<div>` (rootRef) and the portaled menu `<ul>`
      (listRef); typing it `ReactKeyboardEvent<HTMLDivElement>` makes
      the <ul> binding fail the handler's signature check. Either
      split into two handlers, or — simpler — widen to `HTMLElement`
      and accept that you lose a tiny bit of element-specific type
      safety that you weren't using anyway. TS 5.9's stricter JSX
      event-handler inference surfaces this; TS 5.4 let it slide
      because of weaker contravariance checking.
    applied: true

  - id: 37
    date: 2026-04-22
    source: "session"
    category: typing
    lesson: |
      TypeScript 5.9 types `DataTransfer.types` as `readonly string[]`
      (not the legacy `DOMStringList`), which means a runtime
      structural cast to `DOMStringList` is rejected because
      `DOMStringList` has extra required members (`item`, numeric
      indexer) that `readonly string[]` doesn't provide. For
      cross-browser DataTransfer.types handling, cast through
      `unknown` to a minimal shape
      `{ contains?: (s: string) => boolean }` and feature-test before
      calling — falls back to `Array.from(types).includes(MIME)` on
      the modern array-form. This pattern also works for any
      legacy-DOM-vs-modern interop where the old type had strict
      structural requirements but the new one doesn't.
    applied: true

  - id: 38
    date: 2026-04-22
    source: "session"
    category: tooling
    lesson: |
      File-tool Edit/Write operations can silently leave files
      partially null-padded or truncated on disk, even when the tool
      result reports success and subsequent Read calls return
      apparently-complete content. Symptom: host `tsc` reports "JSX
      element has no corresponding closing tag" on files you just
      edited, while the sandbox Read shows the full file. Safest fix
      path for a significantly-corrupted file: (a) check `git status`
      — if the file is tracked and HEAD has a clean prior version,
      `git show HEAD:path > /tmp/clean.ext` then `cp /tmp/clean.ext
      path`; (b) if the file is untracked or HEAD is stale, rewrite
      the whole file in one bash heredoc
      (`cat > path << 'EOF' ... EOF`) which writes atomically via
      shell redirect and can't produce a half-written file;
      (c) verify with `wc -l`, `tail -N`, `tr -cd '\000' < path | wc
      -c`, `file path`, and brace/paren balance counts.
      NEVER attempt "cleanup" via `tr -d '\000'` on a file you
      suspect is corrupted — it strips legitimate bytes if the file
      is partly written and leaves behind a syntactically-plausible
      but semantically-broken prefix.
    applied: true

  - id: 39
    date: 2026-04-22
    source: "session"
    category: tooling
    lesson: |
      Tauri v1's scaffolded vite.config.ts uses `target: 'safari13'` for
      non-Windows builds, but esbuild's compat table refuses to
      down-transpile certain parameter-destructuring and arrow-function
      patterns below Safari 14 — the build fails with "Transforming
      destructuring to the configured target environment (safari13 + N
      overrides) is not supported yet" on perfectly normal code like
      `const Provider = ({ children, foo = 'default' }) => {...}`. The
      fix is to bump the target to `safari14`, which matches Tauri v2's
      recommended macOS 11 (Big Sur) minimum and is the lowest esbuild
      accepts for modern destructuring. This is a pure tooling
      constraint, not a runtime one — Safari 13 supports all these
      features at runtime. If you need to keep safari13 as the runtime
      floor, you'd have to write the code without the patterns esbuild
      flags, which in practice means no parameter destructuring with
      defaults — not a viable constraint for a React codebase.
    applied: true

  - id: 47
    date: 2026-04-23
    source: "session"
    category: architecture
    lesson: |
      Serde's derived Serialize for a Rust enum produces an externally-
      tagged shape like `{"NotAFile": {"path": "..."}}` that's awkward
      to consume from TypeScript — every branch has a different key,
      so the TS side needs a deserializer pass to even get to the
      discriminant. For a cross-language error taxonomy (Tauri IPC
      errors, gRPC-over-JSON bridges, anything that crosses a typed
      boundary with a string-literal-union on the receiving end),
      hand-roll a `Serialize` impl that flattens to
      `{"kind": "...", "message": "..."}`. Then the TS caller can
      `switch (err.kind)` over a union of string literals with
      exhaustiveness checked. Variant payload fields (like `offset`
      in `InvalidUtf8 { offset: usize }`) fold into the human-readable
      `message` via thiserror's `#[error(...)]` format string —
      losing the structured field in transport is usually fine
      because UI code almost always just renders the message anyway.
      If a specific variant field ever needs typed access on the TS
      side, add it to the flat payload alongside `kind`/`message` —
      don't revert to serde's default enum tagging.
    applied: true

  - id: 48
    date: 2026-04-23
    source: "session"
    category: testing
    lesson: |
      For a Tauri IPC layer (`@tauri-apps/api/core`'s `invoke`),
      prefer a lazy dynamic import inside a small seam function over a
      top-level import. Two reasons. (1) Vitest in jsdom doesn't ship
      the Tauri runtime — a top-level import blows up at module load
      during tests that only exercise wrapper logic. (2) A dynamic
      import with a literal module string still tree-shakes cleanly
      in production Vite builds, so you pay nothing for the
      flexibility. Pair it with a `__setInvokeForTests(fn | null)`
      escape hatch that lets unit tests inject a `vi.fn()` without
      having to mock an entire ES module graph. The underscore prefix
      + explicit `ForTests` naming makes the seam obvious as
      test-only when grepping production code. This pattern
      generalizes to any singleton platform API (`window.crypto`,
      `navigator.clipboard`, Electron IPC) that is absent or
      unreliable in the test environment.
    applied: true

  - id: 49
    date: 2026-04-23
    source: "decision"
    category: architecture
    lesson: |
      When scaffolding a backend command surface for a suite of tools
      that land across multiple sub-phases, resist the urge to stand
      up every command the roadmap mentions. For Hyperspanner Phase
      6.0 the temptation was to land `hash_bytes`, `decode_protobuf`,
      and `tls_inspect` alongside the filesystem commands — after
      all, they're "planned." Deferring each to the sub-phase that
      actually ships the consumer (`hash_bytes` → 6.4, `decode_*` +
      `tls_*` → 6.5) avoids two traps: (a) the command signature gets
      designed against an imagined UI and has to be re-shaped when
      the real tool lands, and (b) you drag in heavy dependencies
      (`prost-reflect`, `rustls`, a RustCrypto stack) before anything
      in the codebase actually uses them, which slows every cold
      `cargo build` for weeks of development for no benefit. The
      right Phase-N.0 command surface is: the commands the
      immediately-next sub-phase needs, plus the shared infra
      (error module, IPC wrapper, module layout) that any future
      command will slot into. Everything else is "later" and should
      stay later.
    applied: true

  - id: 40
    date: 2026-04-23
    source: "session"
    category: architecture
    lesson: |
      For load-bearing chrome where absolutely-positioned decorative
      elements (e.g. an elbow welded to a bar) anchor to a container's
      edge, never pin the container with a fixed `height`. Use
      `min-height` instead. Fixed height + `overflow: hidden` silently
      clips content the moment interior pressure (a titleChip that
      appears on tool selection, a nav row that wraps on narrow
      viewports, a longer title string) exceeds the reserved budget —
      and the absolute elbow keeps painting at `bottom: 0` of a
      container whose intrinsic content bottom now sits above the clip
      line, so the elbow visually detaches from the bar it was supposed
      to weld to. Symptom in LcarsStandardLayout: "top-bar segments
      disappear when I select a tool; reset brings them back" — reset
      clears the titleChip, the title row shrinks to one line, content
      fits under the fixed height, and the clip stops engaging. The
      fix is one word: `height` → `min-height`. The consumer still
      pins the baseline compactness (AppShell keeps 185px via
      --lcars-layout-top-row-height), but the row can now grow with
      its content instead of clipping it. `flex-shrink: 0` on the
      wrap still prevents pressure from sibling rows. Companion
      principle: any container that (a) has `overflow: hidden` and
      (b) hosts position:absolute children anchored to its edges
      should be audited for this anti-pattern — the hidden overflow
      turns "too much content" into "invisibly misaligned chrome"
      rather than "visible overflow you can spot and fix."
    applied: true

  - id: 41
    date: 2026-04-23
    source: "session"
    category: architecture
    supersedes: 40
    lesson: |
      SUPERSEDES lesson #40's recommendation. The min-height fix
      there traded a clipping bug (top-bar segments disappearing on
      tool selection) for a height-growth bug: the top chrome started
      to breathe every time the active tool changed or nav pills wrapped,
      which reads as layout jitter and violates the LCARS grammar
      expectation that the top frame is a stable, fixed-weight element.
      The correct pattern for fixed-height decorative chrome is:

        (a) Keep the container at FIXED height (not min-height). The
            chrome's visual budget is a design decision, not something
            content should be able to expand.
        (b) Absorb growth pressure INSIDE the fixed budget by making
            content-bearing rows strictly non-wrapping (`flex-wrap:
            nowrap` + `min-width: 0` on the row and on its shrinkable
            children).
        (c) Give the shrinkable children an explicit drop ladder via
            media queries, shedding least-important entries first as
            the viewport narrows. At a floor width, hide the whole
            slot so no overflow/clipping can occur.
        (d) Eliminate accessories that add growth pressure without
            earning their keep. In this case the "secondary title"
            (titleChip rendering the active tool name next to the
            banner) was redundant with the cascade's ACTIVE entry and
            was the single biggest contributor to wrap-induced growth;
            removing it was the cleanest simplification.

      Specifically applied: reverted .wrap.topRow to `height: ...`,
      changed .titleRow to `flex-wrap: nowrap` with `min-width: 0`,
      deleted AppShell's titleChip derivation + prop pass + LcarsChip
      import, and added a 1300/1050/900/700px drop ladder to the
      cascade (ACTIVE stays last; the whole cascade hides ≤ 700px).
      The original clipping symptom no longer occurs because the
      content can no longer grow the row in the first place; the
      fixed-height chrome now degrades via drops rather than via
      clipping. General principle: when a fixed-height chrome's
      content is starting to fight the height, the fix is to shed
      content, not to relax the height.
    applied: true

  - id: 42
    date: 2026-04-23
    source: "session"
    category: architecture
    lesson: |
      Pinning the top-row HEIGHT is only half of "stable chrome" —
      pinning the ROW doesn't pin the CONTENT inside it. Any content
      primitive whose intrinsic size depends on viewport width
      (clamp(...) with a `vw` term, or media queries that change
      font-size / padding) will still breathe as the window resizes.
      The spacer inside the row absorbs the vertical slack so
      downstream siblings like a welded bar don't move — but the
      content itself visibly grows/shrinks, which a user reads as
      "the upper segment height is changing" even though the row's
      outer bounds are fixed.

      Concretely: LcarsBanner.large's default font-size is
      `clamp(1.25rem, 0.75rem + 4vw, 4rem)`. Between a non-maximized
      ~1280px window and a maximized ~1920px window, that resolves
      to ~63px vs a hard-capped 64px — only 1-4 pixels of difference,
      but very much visible. Wider delta (e.g. a non-max ~1000px
      window) amplifies the breath.

      Fix pattern: for any consumer that has pinned the outer chrome
      height, also pin the intrinsic size of the load-bearing content
      primitives that live inside it. LcarsBanner exposes
      `--lcars-font-size-banner` for exactly this — AppShell now sets
      it to a fixed `4rem`, which matches the previous maximized
      look and stays there at every viewport width. More generally:
      audit the content elements inside a pinned chrome for any
      `vw`/`vh` terms or responsive media queries that affect
      intrinsic size, and provide a way to override them when
      visual stability is a hard requirement.

      Companion note: this is the third-in-a-chain of fixes for the
      same user-perceived "top section changes height on me" symptom
      (see #40 and #41). Each round moved the problem one layer
      inward: from the elbow anchor (fixed-height + overflow-hidden
      clip), to the row's growth pressure (titleRow wrap + titleChip),
      to the content primitive's own responsive sizing. The meta-
      lesson is that "stable chrome" is a multi-layer property — every
      layer from the container down to the terminal content primitive
      must be stable, or the composite breathes.
    applied: true

  - id: 43
    date: 2026-04-23
    source: "session"
    category: architecture
    supersedes: 42
    lesson: |
      When you pin a chrome primitive's intrinsic size in `rem`, remember
      that `rem` is anchored to the html element's font-size — and
      apps/desktop/src/styles/global.css sets `html { font-size: 1.2rem }`
      at ≤1300px viewports. So `--lcars-font-size-banner: 4rem` is
      actually 76.8px at those widths, not 64px, and the extra ~13px
      easily blows the 185px top-row budget — clipping the bottom
      topBar segment entirely and producing the "top horizontal
      segment is not visible at all" symptom reported on 2026-04-23.
      This supersedes #42's specific recommendation to set the banner
      pin to 4rem: the general principle (pin the content, not just
      the container) is still correct, but "4rem" is NOT a safe
      concrete value when the html root font-size scales up at narrow
      widths. Use a smaller cushioned value (we now use 3rem = 48px
      at 1rem-html, 57.6px at 1.2rem-html), or pin in raw pixels to
      fully decouple from the html root.

      Paired fix: rail-width responsive scaling was also reverted in
      the same session. Previously global.css shrank
      `--lcars-spacing-left-frame-width` at 1500/1300/950/750/525
      breakpoints (240→200→180→150→120→62). The user observed the
      leftFrameTop visibly changing width as a desktop window resized
      between maximized and restored, which directly contradicts the
      "rock-stable frame" design goal. The 1500/1300/950/750 tiers
      were removed; only the ≤525 mobile-emergency floor remains.

      Meta-lesson: "responsive scaling" of chrome dimensions is a
      feature that trades visual stability for density. When the
      design goal is explicitly visual stability (a pinned
      never-breathing frame), every responsive override of a chrome
      dimension is a latent bug even if each individual rescale was
      defensible on its own. Audit the whole responsive stack
      (`@media` in global.css, clamp/vw in primitives, `rem` values
      that ride html font-size) together, not piecewise.
    applied: true

  - id: 44
    date: 2026-04-23
    source: "session"
    category: architecture
    lesson: |
      "Fit or drop" is cleaner than "fit or shrink" for fixed-height
      chrome slots. Earlier we implemented a per-entry drop ladder
      for the CascadeStatus strip inside titleLeading
      (@media 1300/1050/900/700) — granular, but the intermediate
      states (2 entries, 1 entry, 0 entries) each had their own
      fit math and the 1-entry state still competed with the banner
      for horizontal room. After the user said "The titleLeading
      should disappear if there isn't enough room," we coarsened
      the ladder to two drop-some states (1500, 1300) and one
      drop-all state (1100), and the top row now has one clean
      inflection point (1100px) below which the banner owns the
      full titleRow width. The user perception improved even though
      the quantity of visible information at mid-widths went down.

      Principle: when a slot's purpose is "show optional telemetry
      if it fits," the right failure mode is "vanish, don't compete."
      Intermediate shrink states drag the slot into a horizontal
      fight with the primary content, and the primary content
      always loses something — a gap, an alignment, or a subtle
      re-flow that compounds into visible jitter. One sharp
      disappear threshold beats three graceful shrink thresholds
      for chrome stability.
    applied: true

  - id: 45
    date: 2026-04-23
    source: "session"
    category: architecture
    lesson: |
      The LcarsStandardLayout elbowTop disc depth is coupled to the
      consumer's chosen --lcars-layout-top-row-height. The elbow is
      absolutely positioned `bottom: 0` inside `.rightFrameTop` and
      has height = `calc(discDepth + bar_height)`, where discDepth is
      the primitive's empirical tuning constant (how far up from the
      container bottom the disc's horizontal tangent lands). When the
      row height was 185px, discDepth was 47px and the tangent landed
      cleanly on the bar's top edge. When AppShell dropped the row to
      170px on 2026-04-23, the bar's top edge shifted ~6px up (its
      distance from container bottom shrank by the same amount the
      row did, since the topBarSlot + elbow geometry below it are
      fixed), so discDepth had to drop to 41px to keep the tangent
      on the bar. Symptom if it's wrong: a hairline gap between the
      elbow's curve and the bar's first segment, or the elbow
      overshooting the bar and painting rail color into the spacer
      above it.

      Practical rule: if you retune `--lcars-layout-top-row-height`,
      re-eyeball the elbow tangent and adjust discDepth by roughly
      the same delta (shrinking the row by N px means shrinking the
      disc by ≈N px). A future refactor could expose the depth as
      `--lcars-layout-top-elbow-disc-depth` so consumers can tune
      without editing the primitive CSS; we've deferred that until a
      second consumer (DerisScreen or PrimitiveGallery) actually
      wants a different row height. For now, leave a breadcrumb
      comment on the `.elbowTop` rule pointing at the coupling so the
      next reader doesn't treat 41px as magic.

      Meta: this is another instance of the "stable chrome is a
      multi-layer property" theme from #42 and #43, but inverted — when
      we DO intentionally change one layer (row height), we have to
      cascade the tuning through the layers that depend on it
      (elbow geometry). Pinning a value stable doesn't prevent it
      from being a load-bearing constant for other components.
    applied: true

  - id: 46
    date: 2026-04-23
    source: "error"
    category: tooling
    lesson: |
      Prefer ES-syntax targets (`es2020`, `es2022`) over browser-
      specific targets (`safari14`, `chrome105`) in Vite's
      `build.target` when the runtime environment is known to support
      modern JS. esbuild's browser compat tables have a recurring
      false-positive bug: certain parameter-destructuring and arrow-
      function patterns get flagged as "needs transpilation" for
      Safari 13 / Safari 14, but esbuild then errors with
      "Transforming destructuring to the configured target environment
      ... is not supported yet" because the transformation itself
      isn't implemented. The patterns are supported natively by the
      target browser — esbuild is just wrong about needing to lower
      them.

      We hit this first on `safari13` (the Tauri v1 default) and bumped
      to `safari14`, then hit it again on `safari14` during Phase 4/5
      verification. The pattern will almost certainly repeat if we bump
      to `safari15`. The syntactic target `es2020` avoids the browser
      compat table entirely — esbuild just validates against the ES2020
      spec, which all three Tauri v2 runtimes (WebView2, WKWebView,
      WebKitGTK) fully implement.

      General rule: reach for a browser target only when you have a
      specific feature whose runtime support you're uncertain of.
      Otherwise, use the lowest ES syntax level your code actually
      needs, and let the browser's native engine handle the rest.

      Related: Vite's default target is `'modules'` (≈ES2020 + modern
      browsers), which also works — we chose explicit `es2020` for the
      "the next reader should understand why" documentation value.
    applied: true

  - id: 50
    date: 2026-04-24
    source: "session"
    category: tooling
    lesson: |
      Serde payload structs that cross the Tauri IPC boundary should
      always derive `Debug` + `Serialize` together — and, if they're
      returned from a `#[tauri::command]`, the moment you write any
      unit test that does `.expect_err(...)` or `.unwrap_err()` on
      a `Result<ThisStruct, _>`, you need `Debug`. Rust's `Result`
      methods print the `Ok` value via its `Debug` impl when the
      expectation fails, so missing `Debug` on the success type
      turns an error path test into a compile error (`the trait
      bound `T: Debug` is not satisfied`). The cost of adding
      `Debug` is zero for this shape of struct (no private fields,
      no sensitive data — they already serialize to the TS side),
      so the right rule is to pair `Debug` with `Serialize` by
      default on every IPC payload struct. We hit the missing
      derive on `FileBytes` and `FileText` during Phase 6.0
      verification — five compile errors at the `.expect_err("should
      fail")` sites in `commands/fs.rs::tests`. Adding `Debug` to
      both struct derives was a two-character fix, but the right
      time to make the fix is at struct-declaration time, not at
      "the first test suite that touches the error path" time. If
      you ever want to keep `Debug` off (redaction, private fields),
      write a manual impl rather than skipping the derive — the
      test-site compile error is too easy to trigger accidentally.
    applied: true

  - id: 51
    date: 2026-04-24
    source: "session"
    category: architecture
    lesson: |
      Cross-runtime text parsers (JSON, URL, regex-like) that rely on
      error-message parsing to extract structured position info need
      LAYERED fallback probes, not a single "handles my current
      runtime" regex. The failure mode: a Node 22 minor-version bump
      changed `JSON.parse`'s error format for one specific variant
      (`Unexpected token 'X', "<source fragment>" is not valid JSON`),
      dropping the `position N` suffix and the `line X column Y`
      suffix that older V8 emitted. The normalizer's two regex
      branches (position-form, line-col form) both missed, and the
      function returned `{ line: null, column: null, offset: null }`
      for every "Unexpected token" error — but the test harness was
      checking `expect(r.offset).not.toBeNull()`, so 7 of 22 lib
      tests flipped red on the upgrade without us changing any
      production code. The fix is a multi-probe normalizer that
      tries structured formats first (position N → offset, line X
      column Y → line+col) and then falls back to content-based
      recovery (extract the offending char from the message and use
      `text.indexOf(char)` to compute an offset; `Unexpected end of
      JSON input` → position at `text.length`). Paired improvement:
      the suffix-stripping regex used to clean the displayed message
      needed to be loosened from a quoted-string-only pattern to
      `/,\s*[\s\S]*is not valid JSON\s*$/i` to handle V8's literal
      `...` ellipsis prefix and embedded newlines when the source
      fragment spans lines. General principle: if a parser's error-
      shape contract isn't stable across the runtimes you support
      (Node vs. browser Chromium vs. Safari vs. even different
      Node minors), treat error-message parsing as a best-effort
      extraction that degrades gracefully rather than a structured
      protocol. Start with the most specific structured form, fall
      back through progressively weaker heuristics, and always
      return a non-null offset if ANY probe hits. Tests for this
      normalizer should cover at least three representative error
      strings per target runtime, and should be paired with a node
      probe that prints the actual current-runtime error messages
      so the next reader can verify the regex set is still complete.
    applied: true

  - id: 52
    date: 2026-04-24
    source: "session"
    category: testing
    lesson: |
      `@testing-library/react`'s auto-cleanup does NOT fire under
      Vitest unless `@testing-library/jest-dom` is also imported —
      the cleanup registration lives in jest-dom's setup hook, not
      in @testing-library/react itself. Without jest-dom, every
      `render()` call appends a fresh tree to `document.body` and
      none of them are ever removed, which silently leaks DOM across
      test cases. Symptom: a test suite where the first test passes
      and every subsequent test that queries by role/label/text
      throws `Found multiple elements with the text of: <X>` — the
      previous tests' trees are still attached, so `getByText`
      matches them too. The fix is either (a) install
      `@testing-library/jest-dom` and import it once from a setup
      file, or (b) import `cleanup` from `@testing-library/react`
      explicitly and call it in `afterEach`. We chose (b) to avoid
      pulling in the matcher library we don't otherwise need, and
      to keep the cleanup obligation visible at the top of every
      `*.test.tsx` file. The same fix applies to any framework-
      agnostic render utility (@testing-library/preact, @testing-
      library/svelte, etc.) under Vitest. Rule: component-test suites
      MUST call `cleanup()` in their `afterEach` unless they've
      already wired jest-dom; codify this in the repo's tool-pattern
      doc so every new tool test inherits the invariant instead of
      rediscovering it one failed render at a time.
    applied: true

  - id: 53
    date: 2026-04-24
    source: "session"
    category: testing
    lesson: |
      Generic function types at test seams are fundamentally un-
      satisfiable by concrete test fakes, and trying to satisfy them
      directly produces TS2345 errors that have no clean fix at the
      structural level. The shape: `type InvokeFn = <T>(cmd: string,
      args?: Record<string, unknown>) => Promise<T>` — the caller
      picks `T`, which means a concrete fake like
      `async () => 'pong'` (whose return type is `Promise<string>`)
      cannot satisfy "whatever `T` the caller wants." Real Tauri
      `invoke` has the exact same hole at the type-system level; the
      wire is untyped, so the generic is a promise the platform
      can't actually keep. The pragmatic fix in test code is to
      cast through `unknown` to `InvokeFn`: `(async () => 'pong') as
      unknown as InvokeFn`. This is honest about what we're doing —
      we're asserting "trust me, this fake matches the seam's
      contract at runtime," which is true because the caller picks
      a `T` that aligns with the fake's actual return type. Related
      failure from the same session: with
      `useUnknownInCatchVariables: true`, `.catch((e: unknown) => e)`
      gives you `unknown`, and even though a preceding
      `expect(err).toBeInstanceOf(HyperspannerError)` asserts the
      runtime shape, TypeScript doesn't propagate runtime matcher
      assertions into the compile-time type. To access typed fields,
      narrow with an `if (err instanceof HyperspannerError) { ... }`
      block; the `if` is purely a compile-time device once the
      runtime check has already passed. Both patterns are signals
      that the test is working at the edge of what TS's type system
      can model — the seam's generic promise and the catch's
      unknown fallout — and both have a canonical workaround that
      doesn't require weakening the production types. Don't try to
      "fix" by changing `InvokeFn` to a non-generic shape or
      removing `useUnknownInCatchVariables`; the production types
      are correct for production callers, and the tests are the
      place where the cast lives.
    applied: true

  - id: 54
    date: 2026-04-24
    source: "session"
    category: tooling
    lesson: |
      File tool (`Edit` / `Write`) operations against a WSL-mounted
      Windows filesystem occasionally report success but don't
      actually flush to disk. Caught during UX-1 work on three
      separate files (`LcarsStandardLayout.tsx`, `AppShell.tsx`,
      `AppShell.module.css`): the tool's post-edit view matched the
      intent, but `wc -l` via bash against the same path showed the
      original pre-edit line count, and the TypeScript compiler was
      reporting errors that only made sense against the stale
      content. Diagnosis is cheap: compare the Read tool's reported
      line count to `wc -l` over the bash mount of the same path —
      if they disagree, the file tool hasn't synced. Recovery: rewrite
      the file via a bash heredoc (`cat > /path/to/file << 'EOF' ...
      EOF`), which writes through the sandbox's native path and
      lands reliably. Not worth trying to retry the file tool edit
      repeatedly — in observed cases the sync doesn't recover on its
      own, and re-running a failed Edit sometimes reports "string
      already present" because the file tool's in-memory view has
      the edit even though the disk doesn't. Signature of the
      failure mode: a file edit you're confident landed, followed by
      a compiler/test error that complains about code you just
      replaced. Rule for future sessions: when an edit touches a
      file the typechecker or test runner will consult, spot-check
      with `wc -l` or `head -N` before handing back to the user.
      Keep this lesson distinct from lesson #2 — that one's about
      pnpm symlinks being unreadable from the sandbox; this one's
      about plain-file writes from the file tool not always
      reaching the mounted disk. Different failure surface, same
      underlying root (WSL ↔ Windows filesystem boundary), different
      workaround.
    applied: true

  - id: 55
    date: 2026-04-24
    source: "decision"
    category: architecture
    lesson: |
      When a single consumer needs to retheme a padding, margin,
      gap, or color on a shared layout primitive, prefer a CSS
      custom property over a new TS prop. The UX-1 flush-right work
      is the canonical example: AppShell needs
      `padding-right: 0` on both the primitive's `.wrap` and its
      `.main` so the Inspector sits flush against the window edge,
      but every other consumer (DerisScreen, PrimitiveGallery, the
      gallery sub-screens) wants the canonical LCARS clamp. A prop
      like `flushRight?: boolean` would have worked for this one
      case, but the next consumer will want "flush top", then
      "flush left on narrow viewports", then "custom main-right
      clamp," and the prop surface grows without bound. The
      primitive instead exposes the knobs as
      `var(--lcars-layout-*, <default>)` declarations; consumers
      override by setting the variable in their own style object
      (AppShell's `layoutStyle` map). Zero changes to the
      primitive's TS signature, inherits cleanly for every non-
      overriding consumer, and the vars are trivially discoverable
      — grep for `--lcars-layout-` in the primitive's CSS to see
      the full knob set. Rule: new layout-tuning knobs land as CSS
      vars first, get promoted to props only if a prop offers
      something CSS vars can't (e.g. it triggers other TS-level
      behavior in the primitive, or the value is structural rather
      than presentational). Adjacent corollary: chrome-density
      states like "collapse the top row" should live as entries in
      the workspace's `CollapsibleZone` / `ZoneCollapseState` data
      model, toggled through the same `toggleZone` verb the rest
      of the shortcut registry already speaks, rather than as a
      prop on the primitive plus a bespoke handler. Same rationale
      — one state machine, one shortcut grammar, persist-middleware
      picks it up automatically when that phase lands.
    applied: true

  - id: 56
    date: 2026-04-24
    source: "session"
    category: process
    lesson: |
      Before fanning out N parallel subagents to build sibling-shaped
      artifacts (tools, screens, commands — anything where the set shares
      an interior pattern), invest the context tokens to read the full
      reference implementation yourself first, then brief every subagent
      with the same reference paths. Don't rely on a pattern doc plus the
      task description — subagents read it and converge on nearby-but-not-
      identical shapes, which means merging their output costs more than
      the upfront reads would have. For Phase 6.2 we read JSON Validator's
      `lib.ts` (287 lines), `JsonValidator.tsx` (239), and `index.ts` (19)
      before spawning seven tool-building subagents. Result: six of seven
      tools came back matching the six-file template on the first try; the
      one deviation (RegexTester flag toggles using inline buttons instead
      of LcarsPill) was minor and functionally correct. The cost was ~550
      lines of context paid once; the benefit was seven tools that slotted
      into the registry with only the four-Edit wiring pass the pattern
      predicts. Rule: when you notice you're about to produce more than
      two artifacts on the same shape, read the canonical instance in
      full before spawning. Pattern docs are reference material for
      humans; reference impls are reference material for subagents.
    applied: true

  - id: 57
    date: 2026-04-24
    source: "session"
    category: process
    lesson: |
      Parallel subagent builds need an explicit ownership contract, or
      shared resources (package.json, registries, install lockfiles)
      become a race. The working contract for Phase 6.2's seven-tool
      fanout — reuse for 6.3–6.5 and any similar N-way build:

        (a) EXCLUSIVE OWNERSHIP: each subagent owns one folder and
            creates only files within it. Never two subagents writing
            into the same subtree.
        (b) SHARED-FILE DESIGNATED EDITOR: for files every subagent
            might need to touch (package.json for new deps, a shared
            types file, a tsconfig), pick one subagent as the sole
            editor per dep/change. Phase 6.2 let the YAML subagent
            add `js-yaml` to package.json; no other subagent was
            allowed to touch package.json. This prevents lost-update
            races where two subagents independently add different
            dependency lines and one's change gets clobbered.
        (c) PARENT-OWNED WIRING: the final integration step (registry
            flip-over, `pnpm install`, typecheck/test runs) happens
            at the parent, AFTER all subagents complete. The parent
            has the global view; subagents don't.
        (d) PARALLEL SPAWN DISCIPLINE: "parallel" isn't a narration
            word, it's a message-shape constraint — spawning happens
            by sending one message with N Agent tool_use blocks.
            Saying "I'll spawn these in parallel" and then emitting
            one Agent call per message is serial, no matter what
            the prose claims. Before sending a batch, eyeball the
            outgoing message and confirm it contains multiple
            tool_use entries.
        (e) RATE-LIMIT RECOVERY: if a subagent fails mid-run (rate
            limit, tool error), DON'T immediately respawn. First,
            `Glob` or `Read` the subagent's target folder to see what
            already landed — agents often complete the bulk of file
            writes before the failure and only the tail is missing.
            Phase 6.2's URL Codec subagent rate-limited after all six
            files had flushed to disk; checking artifacts before
            respawning avoided a redundant rerun. General principle:
            treat subagent failures like crashes of a streaming
            writer — the partial output is almost always usable, and
            the recovery plan starts with "what's on disk?"

      Pair this with lesson #56 (shape lockdown via reference-impl
      reads). Together they're the repeatable recipe for N-way
      convergent builds: read the reference yourself, then fan out
      with an ownership contract, then wire up and verify at the
      parent. Lesson #25 covers a narrower case (two subagents
      editing the same registry file with non-overlapping Edit
      regions) — this lesson generalizes that to whole shared files
      via single-editor designation.
    applied: true

  - id: 58
    date: 2026-04-24
    source: "error"
    category: tooling
    lesson: |
      TypeScript's module resolver is too permissive about pnpm's
      internal store to catch a missing workspace-level dep install on
      its own. When you add a new runtime dep to a workspace package's
      `package.json` but don't actually run `pnpm install` against the
      updated manifest, `tsc` can still resolve the types (it finds
      them at `node_modules/.pnpm/node_modules/<pkg>/` if any other
      package in the workspace has pulled them in transitively), AND
      `vitest` + `vite build` both inherit enough of tsc's resolution
      to pass too — so the whole typecheck / test / build chain can
      go green while `apps/desktop/node_modules/<pkg>` is literally
      not on disk. Then the first `pnpm tauri dev` or `pnpm dev`
      throws `Failed to resolve import "<pkg>" from "..."` because
      Vite's dev-server import resolver uses the strict Node algorithm
      (walk the consumer's own node_modules tree) and doesn't consult
      the pnpm store.

      We hit this exactly at Phase 6.2 sign-off: YAML Validator's
      subagent added `js-yaml ^4.1.0` to `apps/desktop/package.json`,
      typecheck + test + build all passed, I marked verification
      green, user confirmed, then the dev-server cold start died on
      the js-yaml import. `js-yaml@4.1.1` was in the lockfile — but
      only as a transitive eslint dep at line 2159, not as an
      importer of `@hyperspanner/desktop`. One `pnpm install` run at
      the workspace root fixed it.

      Concrete rule: when a session introduces a new runtime dep
      (not a devDep, not a transitive bump — an actual new import in
      product code), the verification gate set MUST include a
      dev-server cold start against the tool that uses the dep, not
      just typecheck / test / build. For this repo: `pnpm tauri dev`
      + click through to the affected tool is the canonical smoke.
      For pure-web projects, `vite dev` + load the consuming route is
      equivalent. The smoke doesn't need to be exhaustive — just a
      cold Vite boot, because that's where the import resolver
      actually flexes against the workspace's own node_modules.

      Related pitfall: marking a verification task "complete" based
      on the user's "all checks pass" confirmation without being
      crisp about which checks ran. The user ran typecheck / test /
      build; they didn't cold-start the dev server. If a session
      surfaces a new runtime dep, either explicitly ask "did you also
      start the dev server?" or put that smoke in the next-actions
      list so it happens on the next session instead of tripping the
      user up.

      Meta: adjacent to lesson #18 (Linux sandbox can't run `pnpm
      install`) and lesson #2 (can't traverse pnpm symlinks from the
      sandbox) — both of which are why dev-server-adjacent
      verification has to run on the host. Sandbox-side claims of
      "install succeeded" should be treated with suspicion when
      there's no evidence of a working node_modules tree on the
      host; prefer letting the user run `pnpm install` themselves
      and report back over claiming a sandbox install worked.
    applied: true

